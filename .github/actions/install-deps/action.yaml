name: Install dependencies
description: Install Node, NPM and all project dependencies.

inputs:
  node-version:
    description: Node version used to install dependencies
    type: string
    required: false
    default: '18.x'
  npm-version:
    description: NPM version to install globally before `npm ci`. Leave empty (default) to use the npm bundled with the selected node version. Set to a specific version (e.g. '10.9.7') to pin. Avoid 'latest' — it triggers npm/cli#9151 on Node 22.
    type: string
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'npm'
    - name: Upgrade npm
      if: inputs.npm-version != ''
      run: npm i -g npm@${{ inputs.npm-version }}
      shell: bash
    - run: node --version
      shell: bash
    - run: npm --version
      shell: bash

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: ~/.npm
        key: npm-${{ hashFiles('package-lock.json') }}
        restore-keys: npm-

    - name: Install dependencies
      run: npm ci --prefer-offline
      shell: bash
